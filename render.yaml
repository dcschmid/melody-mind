# Render Blueprint for MelodyMind Music
# https://render.com/docs/blueprint-spec
#
# MelodyMind is deployed as a single static Astro app.
# The main domain melody-mind.de should point to this service.

services:
  - type: web
    name: melody-mind-music
    runtime: static
    buildCommand: pnpm install && pnpm build
    staticPublishPath: apps/music/dist
    buildFilter:
      paths:
        - apps/music/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
        - pnpm-workspace.yaml
        - render.yaml
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /audio/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "22"
