# Render Blueprint for MelodyMind Music
# https://render.com/docs/blueprint-spec
#
# MelodyMind is deployed as a single static Astro app.
# The main domain melody-mind.de should point to this service.

services:
  - type: web
    name: melody-mind-music
    runtime: static
    buildCommand: pnpm install && pnpm build
    staticPublishPath: apps/music/dist
    buildFilter:
      paths:
        - apps/music/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
        - pnpm-workspace.yaml
        - render.yaml
    routes:
      - type: redirect
        source: /music/genre/*
        destination: /genre/*
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()
      # Report-Only first: watch the browser console for a deploy cycle,
      # then rename to Content-Security-Policy once it stays quiet.
      - path: /*
        name: Content-Security-Policy-Report-Only
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.usefathom.com https://cusdis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https://eu2.contabostorage.com blob:; connect-src 'self' https://cdn.usefathom.com https://cusdis.com https://webmention.io; frame-src https://cusdis.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self' https://cusdis.com"
      # HTML (and anything not matched more specifically): always revalidate.
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # The search index only changes on deploy; skip the revalidation
      # round-trip on repeat palette opens but pick up deploys within the hour.
      - path: /search-index.json
        name: Cache-Control
        value: public, max-age=3600, stale-while-revalidate=86400
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /audio/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "22"
