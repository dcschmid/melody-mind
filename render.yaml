# Render Blueprint for MelodyMind Monorepo
# https://render.com/docs/blueprint-spec

services:
  # Knowledge App - Main Domain (melody-mind.de)
  - type: web
    name: melody-mind-knowledge
    runtime: static
    buildCommand: pnpm install && pnpm build:knowledge
    staticPublishPath: apps/knowledge/dist
    buildFilter:
      paths:
        - apps/knowledge/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
        - pnpm-workspace.yaml
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "22"

  # Quiz App - Quiz Subdomain (quiz.melody-mind.de)
  - type: web
    name: melody-mind-quiz
    runtime: static
    buildCommand: pnpm install && pnpm build:quiz
    staticPublishPath: apps/quiz/dist
